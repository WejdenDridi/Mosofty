<div class="emp-inner-page">
  <header>
    <h1 class="emp-page-title">Files</h1>
    <p class="emp-page-desc">Upload, search, and download assets shared with your team.</p>
  </header>

  <div class="emp-toolbar glass-card" style="padding: 16px 20px">
    <div class="emp-search-field">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="search" placeholder="Search files…" [value]="search()" (input)="search.set($any($event.target).value)" />
    </div>
  </div>

  <input #fileInput type="file" hidden (change)="onUploadPick($event)" multiple />

  <button type="button" class="emp-upload-zone" (click)="triggerPick(fileInput)">
    <strong>Drop files here or click to upload</strong>
    <p style="margin: 8px 0 0; color: var(--text-muted); font-size: 0.88rem">Mock upload — files appear in the list instantly.</p>
  </button>

  <section class="glass-card" style="padding: 0; overflow: hidden">
    <table class="emp-files-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Size</th>
          <th>Uploaded</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (f of filtered(); track f.id) {
          <tr>
            <td>
              <div style="display: flex; align-items: center; gap: 10px">
                <span class="emp-file-icon" [attr.data-ext]="f.ext"></span>
                <span style="font-weight: 600">{{ f.name }}</span>
              </div>
            </td>
            <td style="text-transform: uppercase; font-size: 0.75rem; color: var(--info)">{{ f.ext }}</td>
            <td>{{ f.size }}</td>
            <td style="color: var(--text-muted)">{{ f.uploadedAt }}</td>
            <td><button type="button" class="emp-dl">Download</button></td>
          </tr>
        }
      </tbody>
    </table>
  </section>
</div>
