<div class="shell">
  <div class="card">
    <h1>Sign in</h1>
    <p class="muted">Internal Management System</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" />
      </label>
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <span class="field-error">Valid email is required</span>
      }

      <label>
        Password
        <input type="password" formControlName="password" autocomplete="current-password" />
      </label>
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <span class="field-error">At least 6 characters</span>
      }

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }

      <button type="submit" [disabled]="submitting()">{{ submitting() ? 'Signing in…' : 'Sign in' }}</button>
    </form>

    <div class="footer-actions">
      <p class="muted">No account?</p>
      <button type="button" routerLink="/register" class="signup-button">Create account</button>
    </div>
  </div>
</div>
